services:
  - type: web
    name: nexus-auth
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeployTrigger: 'commit'
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: '*'
    region: oregon
